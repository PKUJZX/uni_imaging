model:
  class_name: model.LVSM_odt_decoder_only_latentoken_unet3d_mutistage.Images2LatentScene

  image_tokenizer:
    image_size: 256
    patch_size: 8
    in_channels: 6 # 2 re+im + (2 bg + 2 ray_o_xy)

  voxel_pos_tokenizer:
    voxel_size: [128,256,256]
    patch_size: 8
    in_channels: 27  # 3 direction + 24 pos embedding 
  transformer:
    d: 768
    d_head: 64
    n_layer: 24
    n_latent_vectors: 3072
    special_init: true
    depth_init: true
    use_qk_norm: true

training:
  amp_dtype: bf16
  api_key_path: ./configs/api_keys.yaml
  batch_size_per_gpu: 1
  beta1: 0.9
  beta2: 0.95
  allowed_gradnorm_factor: 5
  center_crop: true
  reset_training_state: true
  exclude_pretrained_keys:
  - target_pose_tokenizer
  - image_token_decoder 
  vis_every: 1000
  eval_every: 1000
  checkpoint_every: 5000
  dataset_name: data.dataset_scene.Dataset
  dataset_path: 
  - /nvme/data/xiangyou/odt_processdata_train_3d/train/full_list.txt
  eval_dataset_path: 
  - /nvme/data/xiangyou/odt_processdata_train_3d/val/full_list.txt
  grad_accum_steps: 1
  grad_checkpoint_every: 1
  grad_clip_norm: 1.0
  exp_name : test
  l2_loss_weight: 1.0
  l1_loss_weight: 0.0
  freeze_pretrained: true

  lr: 0.0004
  train_steps: 50000


  # 数据集每个样本的视角数（view_selector 只采 input，不再拼 target）
  num_input_views: 12
  view_sampling:
    rings:
      - [0, 23]
      - [24, 71]
      - [72, 143]
      - [144, 239]
    jitter_prob: 0.05
    jitter_max_step: 1
  num_threads: 8
  num_workers: 1
  prefetch_factor: 32
  print_every: 20


  square_crop: true
  target_has_input: true
  use_amp: true
  use_rel_pose: false
  use_tf32: true
  view_selector:
    max_frame_dist: 192
    min_frame_dist: 25
  wandb_exp_name: LVSM_scene_decoder_only
  wandb_log_every: 50
  
  wandb_project: LVSM
  warmup: 3000
  weight_decay: 0.05

inference_3d:
  output_dir: /home/lxy/LVSM_3d_for_odt/3d_results_256
  checkpoint_dir: /home/lxy/LVSM_3d_for_odt/odt3dexperiments/checkpoints/LVSM_odt_3d_decoder_only_alldata_24layers_l2loss1.0_50ksteps_ps8bs1_upsample3d3.0_withpretrained2d_fourstages
  scene_json_path: /data/lxy/odt_processdata_train_3d/test/metadata/ODT-532nm-sample-2025-10-31-23-29-13_slice_002.json
  sample_method: uniform  # uniform or random
  seed: 777
# inference / evaluation
inference:
  if_inference: False
  compute_metrics: False
  view_idx_file_path: ./data/evaluation_index_re10k.json
  render_video_config:
    traj_type: interpolate
    num_frames: 60
    loop_video: True 
    order_poses: False

