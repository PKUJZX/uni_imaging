model:
  class_name: model.odt_direct_inversion.ODTDirectInversion
  encoder_ckpt: "/gpfs/share/home/2401112587/lxy/ODT_pretrain/odt3dexperiments/checkpoints/odt_mae_pretrain_bs64_50ksteps_cls16_lr4e-4/encoder_0000000000050000.pt"
  freeze_encoder: false
  memory_mode: cls   # all_frames or cls
  frame_count: 240
  image_size: 256
  patch_size: 16
  num_cls_tokens: 16
  voxel_size: [128, 256, 256]
  voxel_grid: [8, 16, 16]
  voxel_pos_tokenizer:
    patch_size: 16
    in_channels: 27  # 3 coords + 24 NeRF pos embedding
  enc_emb_dim: 512
  enc_nlayer: 16
  enc_nhead: 16
  dec_emb_dim: 512
  dec_nlayer: 8
  dec_nhead: 16
  cross_attn_heads: 16
  cross_attn_query_chunk_size: 256
  cross_attn_dropout: 0.0
  voxel_decoder_channels: [384, 192, 48, 12]
  voxel_decoder_head_channels: 12
  voxel_output_activation: sigmoid

training:
  dataset_name: data.odt_datasets.ODTFullFramePackedVoxelDataset
  dataset_path: 
  - /gpfs/share/home/2401112587/lxy/odt_processdata_train_3d_fullframe/train/full_list.txt
  - /gpfs/share/home/2401112587/lxy/odt_processdata_train_h1k293_fullframe/train/full_list.txt
  eval_dataset_path: 
  - /gpfs/share/home/2401112587/lxy/odt_processdata_train_3d_fullframe/val/full_list.txt
  - /gpfs/share/home/2401112587/lxy/odt_processdata_train_h1k293_fullframe/val/full_list.txt
  checkpoint_dir: ./odt3dexperiments/checkpoints/odt_direct_inversion_bs1_50ksteps_cls_finetuneencoder_lr8e-5_16downsampled
  reset_training_state: false
  exp_name: odt_direct_inversion
  batch_size_per_gpu: 1
  train_steps: 50000
  grad_accum_steps: 1
  lr: 0.00008
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.05
  warmup: 3000
  scheduler_type: cosine
  grad_clip_norm: 1.0
  allowed_gradnorm_factor: 5
  l2_loss_weight: 1.0
  l1_loss_weight: 0.0
  use_amp: true
  amp_dtype: bf16
  use_tf32: true
  seed: 777
  num_threads: 8
  num_workers: 4
  prefetch_factor: 4
  print_every: 20
  eval_every: 1000
  vis_every: 1000
  checkpoint_every: 5000
  tensorboard_flush_every: 100

inference:
  task: voxel_main
  compute_metrics: true
  output_dir: ./odt3dexperiments/inference/odt_direct_inversion
