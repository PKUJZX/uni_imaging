model:
  class_name: model.odt_mae.ODTMaskedAutoencoder
  frame_count: 240
  image_size: 256
  patch_size: 16
  num_cls_tokens: 16
  mask_ratio: 0.75
  enc_emb_dim: 512
  enc_nlayer: 16
  enc_nhead: 16
  dec_emb_dim: 256
  dec_nlayer: 8
  dec_nhead: 16

training:
  dataset_name: data.odt_datasets.ODTMAEPackedPatchDataset
  dataset_path: 
  - /gpfs/share/home/2401112587/lxy/odt_processdata_train_3d_patch/train/full_list.txt
  - /gpfs/share/home/2401112587/lxy/odt_processdata_train_h1k293_patch/train/full_list.txt
  eval_dataset_path: 
  - /gpfs/share/home/2401112587/lxy/odt_processdata_train_3d_patch/val/full_list.txt
  - /gpfs/share/home/2401112587/lxy/odt_processdata_train_h1k293_patch/val/full_list.txt
  checkpoint_dir: ./odt3dexperiments/checkpoints/odt_mae_pretrain_bs64_50ksteps_cls16_lr4e-4
  reset_training_state: false
  exp_name: odt_mae_pretrain
  batch_size_per_gpu: 64
  train_steps: 50000
  grad_accum_steps: 1
  lr: 0.0004
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.05
  warmup: 3000
  scheduler_type: cosine
  grad_clip_norm: 1.0
  allowed_gradnorm_factor: 5
  use_amp: true
  amp_dtype: bf16
  use_tf32: true
  seed: 777
  num_threads: 8
  num_workers: 4
  prefetch_factor: 16
  pin_memory: true
  print_every: 20
  eval_every: 1000
  vis_every: 2000
  checkpoint_every: 5000
  tensorboard_flush_every: 100
