# Ptycho center-token MAE pretraining.
#
# A100 quick validation after copying real HDF5 paths:
#   python pretrain_mae.py --config configs/pretrain_mae.yaml training.train_steps=20 training.eval_every=10 training.checkpoint_every=20
# Multi-GPU A100:
#   torchrun --nproc_per_node=8 pretrain_mae.py --config configs/pretrain_mae.yaml

model:
  class_name: model.ptycho_mae.PtychoCenterMaskedAutoencoder
  dp_size: 64
  scan_patch_size: 3
  center_token_id: 4
  use_probe_tokens: true
  embed_dim: 768
  dec_embed_dim: 512
  enc_depth: 12
  dec_depth: 8
  d_head: 64
  mlp_ratio: 4.0
  dropout: 0.0
  use_qk_norm: true

data:
  dp_key: diffraction_patterns
  probe_intensity_key: probe_intensity
  probe_phase_key: probe_phase
  projected_potential_key: projected_potential
  require_projected_potential_bounds: false
  projected_potential_patch_size: 16
  projected_potential_scan_upsample: 10
  normalization:
    dp: log1p_zscore
    probe: zscore
    eps: 1.0e-6
    dp_scale: 1.0
    probe_scale: 1.0

training:
  dataset_name: data.ptycho_datasets.PtychoCenterMAEDataset
  dataset_path:
    - /path/to/ptycho/train
  eval_dataset_path:
    - /path/to/ptycho/val
  checkpoint_dir: ./ptycho_experiments/checkpoints/ptycho_mae_pretrain
  exp_name: ptycho_mae_pretrain

  batch_size_per_gpu: 64
  train_steps: 100000
  grad_accum_steps: 1
  lr: 0.0004
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.05
  warmup: 3000
  scheduler_type: cosine
  grad_clip_norm: 1.0

  use_amp: true
  amp_dtype: bf16
  use_tf32: true
  seed: 777
  num_threads: 8
  num_workers: 8
  prefetch_factor: 4
  pin_memory: true
  persistent_workers: true

  print_every: 20
  eval_every: 1000
  vis_every: 1000
  checkpoint_every: 5000
  max_vis_items: 2
  tensorboard_flush_secs: 120
