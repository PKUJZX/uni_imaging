# Ptycho projected-potential downstream task.
#
# Train (single process):
#   python train.py --config configs/train.yaml model.encoder_ckpt=/path/to/ptycho_mae_pretrain
# Train (A100 multi-GPU):
#   torchrun --nproc_per_node=8 train.py --config configs/train.yaml model.encoder_ckpt=/path/to/ptycho_mae_pretrain
# Inference:
#   python inference.py --config configs/train.yaml inference.checkpoint_dir=/path/to/downstream_ckpt_dir

model:
  class_name: model.ptycho_downstream.PtychoProjectedPotentialModel
  encoder_ckpt: ""          # dir or file with pretrained encoder_*.pt; empty -> random encoder
  freeze_encoder: true      # set false to fine-tune the encoder end-to-end
  dp_size: 64
  scan_patch_size: 3
  center_token_id: 4
  use_probe_tokens: true
  embed_dim: 768
  enc_depth: 12
  d_head: 64
  mlp_ratio: 4.0
  dropout: 0.0
  use_qk_norm: true
  pp_patch_size: 16
  dec_base_grid: 4
  dec_channels: [512, 256, 128]

data:
  dp_key: diffraction_patterns
  probe_intensity_key: probe_intensity
  probe_phase_key: probe_phase
  projected_potential_key: projected_potential
  projected_potential_patch_size: 16
  projected_potential_scan_upsample: 10
  normalization:
    dp: log1p_zscore
    probe: zscore
    pp: zscore
    eps: 1.0e-6
    dp_scale: 1.0
    probe_scale: 1.0
    pp_scale: 1.0

training:
  dataset_name: data.ptycho_datasets.PtychoProjectedPotentialDataset
  dataset_path:
    - /path/to/ptycho/train
  eval_dataset_path:
    - /path/to/ptycho/val
  checkpoint_dir: ./ptycho_experiments/checkpoints/ptycho_pp_downstream
  exp_name: ptycho_pp_downstream

  batch_size_per_gpu: 64
  train_steps: 50000
  grad_accum_steps: 1
  lr: 0.0002
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.05
  warmup: 2000
  scheduler_type: cosine
  grad_clip_norm: 1.0

  use_amp: true
  amp_dtype: bf16
  use_tf32: true
  seed: 777
  num_threads: 8
  num_workers: 8
  prefetch_factor: 4
  pin_memory: true
  persistent_workers: true

  print_every: 20
  eval_every: 1000
  vis_every: 1000
  checkpoint_every: 5000
  max_vis_items: 2
  tensorboard_flush_secs: 120

inference:
  checkpoint_dir: ""        # empty -> use training.checkpoint_dir
  output_dir: ./ptycho_experiments/inference/ptycho_pp_downstream
  max_items_per_batch: 2
